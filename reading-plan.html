<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Plan | Sanders School Projects</title>
  <link rel="stylesheet" href="dist/output.css">
  <link href="https://unpkg.com/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="p-4 m-4 bg-blue-500 text-white rounded-lg text-center">Reading Plan</div>
    <div class="theme-switch-wrapper justify-end px-4">
      <span>Dark Mode:&nbsp;</span>
      <span class="p-4">
        <label class="theme-switch" for="checkbox">
          <input type="checkbox" id="checkbox" />
          <div class="slider round"></div>
        </label>
      </span>
    </div>
    <div class="px-4 pb-4">
      <a href="index.html" class="text-blue-600 dark:text-blue-400 hover:underline">← Back to Main Page</a>
    </div>
  </header>

  <main class="container mx-auto border border-gray-300 mt-4 bg-white dark:bg-gray-800 transition-colors duration-300">
    <div class="p-4 border-b border-gray-300">
      <h3 class="text-lg font-medium text-gray-900 dark:text-white">Reading Plan Days Range</h3>
      <div class="flex flex-col space-y-2 mt-2">
        <div style="display: flex; align-items: center; gap: 16px; padding: 16px; flex-wrap: wrap;">
          <label style="font-size: 14px; font-weight: 500; color: #374151;">Day Range:</label>
          <div style="width: 300px; position: relative;">
            <div id="daySlider" style="margin: 20px 0;"></div>
          </div>
          <button id="applyDayRange" style="padding: 4px 12px; background-color: #3b82f6; color: white; border-radius: 4px; border: none; cursor: pointer; font-size: 14px;">Apply Range</button>
        </div>
      </div>
    </div>
    <div id="daysContent" class="p-4 text-gray-700 dark:text-gray-300">
      <!-- Reading plan content will be dynamically loaded here -->
    </div>
  </main>

  <script src="https://unpkg.com/nouislider@15.7.1/dist/nouislider.min.js"></script>
  <script src="js/reading-plan.js"></script>
</body>
</html>
